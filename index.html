<!DOCTYPE html>
<html lang="en" class="dark theme-dark">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />

  <title>Fraud Trace Recovery</title>

  <!-- Theme -->
  <meta name="theme-color" content="#020617" />

  <!-- SEO -->
  <meta
    name="description"
    content="Fraud Trace Recovery - Professional Fraud Recovery & Cyber Investigation Platform."
  />

  <meta
    name="keywords"
    content="fraud recovery, cyber investigation, scam reporting, crypto scam"
  />

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />

  <!-- Apple -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta
    name="apple-mobile-web-app-status-bar-style"
    content="black-translucent"
  />
  <meta
    name="apple-mobile-web-app-title"
    content="FraudTrace"
  />

  <link
    rel="apple-touch-icon"
    href="/pwa-192x192.png"
  />

  <!-- Favicon -->
  <link rel="icon" href="/favicon.svg" />

  <!-- Preconnect -->
  <link rel="preconnect" href="http://localhost:5000" />

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #020617;
      color: #fff;
      font-family:
        Inter,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
    }

    #app-loading {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .loading-spinner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }

    .spinner-ring {
      width: 48px;
      height: 48px;
      border: 3px solid #1e293b;
      border-top-color: #06b6d4;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .loading-text {
      color: #94a3b8;
      font-size: 14px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    body.offline::before {
      content: "You are offline";
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: red;
      color: white;
      text-align: center;
      padding: 5px;
      z-index: 9999;
      font-size: 12px;
    }
  </style>
</head>

<body>

  <div id="app-loading">
    <div class="loading-spinner">
      <div class="spinner-ring"></div>
      <div class="loading-text">
        Loading Fraud Trace Recovery...
      </div>
    </div>
  </div>

  <div id="root"></div>

  <!-- Remove loading screen -->
  <script>
    const observer = new MutationObserver(() => {
      const root = document.getElementById('root');

      if (root && root.children.length > 0) {
        const loading =
          document.getElementById('app-loading');

        if (loading) {
          loading.style.opacity = '0';
          loading.style.transition = 'opacity .3s';

          setTimeout(() => {
            loading.remove();
          }, 300);
        }

        observer.disconnect();
      }
    });

    observer.observe(
      document.getElementById('root'),
      {
        childList: true,
        subtree: true
      }
    );

    setTimeout(() => {
      const loading =
        document.getElementById('app-loading');

      if (loading) loading.remove();
    }, 10000);
  </script>

  <!-- Google Translate -->
  <script>
    function googleTranslateElementInit() {
      new google.translate.TranslateElement(
        {
          pageLanguage: "en",
          includedLanguages:
            "en,es,fr,de,pt,ar,ru,zh-CN",
          autoDisplay: false
        },
        "google_translate_element"
      );
    }
  </script>

  <script
    src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"
  ></script>

  <script type="module" src="/src/main.jsx"></script>

</body>
</html>
